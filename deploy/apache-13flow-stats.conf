# Included inside the 13flow.eu TLS VirtualHost by apache-13flow.conf.
# This file is installed only after the Basic Auth password file exists.

# Never send the private report to gunicorn and never count visits to the
# report itself in the source access log.
ProxyPassMatch "^/stats(?:/|$)" !
RedirectMatch 302 "^/stats$" "/stats/"
Alias /stats/ /var/www/html/13flow-stats/
SetEnvIf Request_URI "^/stats(?:/|$)" 13flow_stats_request

<Directory "/var/www/html/13flow-stats">
    Options -Indexes -ExecCGI -Includes
    AllowOverride None
    AuthType Basic
    AuthName "13FLOW private statistics"
    AuthBasicProvider file
    AuthUserFile /etc/apache2/13flow-stats.htpasswd
    Require valid-user
</Directory>

<LocationMatch "^/stats(?:/|$)">
    <LimitExcept GET HEAD>
        Require all denied
    </LimitExcept>

    Header onsuccess unset Cache-Control
    Header always unset Cache-Control
    Header always set Cache-Control "private, no-store, max-age=0"
    Header always set Pragma "no-cache"
    Header always set X-Robots-Tag "noindex, nofollow, noarchive"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()"
    Header always set Cross-Origin-Opener-Policy "same-origin"
    Header always set Cross-Origin-Resource-Policy "same-origin"

    # GoAccess emits a small inline bootstrap and uses its own same-origin JS/CSS
    # assets. Keep this exception scoped to the authenticated report only.
    Header onsuccess unset Content-Security-Policy
    Header always unset Content-Security-Policy
    Header always set Content-Security-Policy "default-src 'self'; img-src 'self' data:; font-src 'self' data:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'none'; object-src 'none'; base-uri 'none'; frame-src 'none'; frame-ancestors 'none'; form-action 'self'; media-src 'none'; worker-src 'none'"
</LocationMatch>
