# /etc/apache2/sites-available/000-zen-default.conf
# Must be enabled before every named vhost. It catches unknown Host headers so
# they never reach an application or contaminate an application's access log.

ServerTokens Prod
ServerSignature Off
TraceEnable Off

LogFormat "%h %l - %t \"%m %U\" %>s %b" zen_default_minimal

<VirtualHost *:80>
    ServerName zen.invalid
    ServerAlias toonux.org toonux.com l0g.me l0g.us w2p.org
    DocumentRoot /var/www/html/zen-default

    <Directory "/var/www/html/zen-default">
        Options -Indexes -ExecCGI -Includes -MultiViews
        AllowOverride None
        DirectoryIndex index.html
        FallbackResource /index.html
        Require all granted
    </Directory>

    <Location "/">
        <LimitExcept GET HEAD>
            Require all denied
        </LimitExcept>
    </Location>

    Header always set Content-Security-Policy "default-src 'none'; style-src 'self'; script-src 'none'; img-src 'none'; font-src 'none'; connect-src 'none'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'; media-src 'none'; worker-src 'none'"
    Header always set Cache-Control "no-store, max-age=0"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
    Header always set X-Robots-Tag "noindex, nofollow, noarchive"
    Header always set Cross-Origin-Opener-Policy "same-origin"
    Header always set Cross-Origin-Resource-Policy "same-origin"
    Header always set X-Zen-Node "online"
    Header always unset Strict-Transport-Security

    ErrorLog  ${APACHE_LOG_DIR}/zen_default_error.log
    CustomLog ${APACHE_LOG_DIR}/zen_default_access.log zen_default_minimal
</VirtualHost>

<VirtualHost *:443>
    ServerName zen.invalid
    ServerAlias toonux.org toonux.com l0g.me l0g.us w2p.org
    DocumentRoot /var/www/html/zen-default

    SSLEngine on
    # A catch-all cannot provide a hostname-valid certificate for an unknown
    # domain. Reuse the maintained certificate so Apache can still isolate any
    # HTTPS request that completes its TLS handshake from application vhosts.
    SSLCertificateFile    /etc/letsencrypt/live/13flow.eu/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/13flow.eu/privkey.pem
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder   off
    SSLSessionTickets     off

    <Directory "/var/www/html/zen-default">
        Options -Indexes -ExecCGI -Includes -MultiViews
        AllowOverride None
        DirectoryIndex index.html
        FallbackResource /index.html
        Require all granted
    </Directory>

    <Location "/">
        <LimitExcept GET HEAD>
            Require all denied
        </LimitExcept>
    </Location>

    Header always set Content-Security-Policy "default-src 'none'; style-src 'self'; script-src 'none'; img-src 'none'; font-src 'none'; connect-src 'none'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'; media-src 'none'; worker-src 'none'"
    Header always set Cache-Control "no-store, max-age=0"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
    Header always set X-Robots-Tag "noindex, nofollow, noarchive"
    Header always set Cross-Origin-Opener-Policy "same-origin"
    Header always set Cross-Origin-Resource-Policy "same-origin"
    Header always set X-Zen-Node "online"
    # Override Zen's broad global policy: these certificates cover the apexes,
    # not every possible subdomain. Keep HSTS scoped to the requested host.
    Header always set Strict-Transport-Security "max-age=31536000"

    ErrorLog  ${APACHE_LOG_DIR}/zen_default_error.log
    CustomLog ${APACHE_LOG_DIR}/zen_default_access.log zen_default_minimal
</VirtualHost>
