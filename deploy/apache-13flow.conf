# /etc/apache2/sites-available/13flow.conf  —  13FLOW open build for 13flow.eu
# Apache fronts gunicorn (127.0.0.1:8000). Enable modules first:
#   a2enmod proxy proxy_http headers ssl rewrite
#
# The open build is read-only/GET-only; we deny everything else at the edge.
# Get certificates WITHOUT letting certbot rewrite this file:
#   certbot certonly --apache -d 13flow.eu -d www.13flow.eu

ServerTokens Prod
ServerSignature Off
TraceEnable Off

# ---------- HTTP :80  ->  force HTTPS (apex) ----------
<VirtualHost *:80>
    ServerName 13flow.eu
    ServerAlias www.13flow.eu
    RewriteEngine On
    RewriteRule ^/(.*)$ https://13flow.eu/$1 [R=301,L]
</VirtualHost>

# ---------- HTTPS :443 ----------
<VirtualHost *:443>
    ServerName 13flow.eu
    ServerAlias www.13flow.eu

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/13flow.eu/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/13flow.eu/privkey.pem
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder   off
    SSLSessionTickets     off

    # Canonicalize www -> apex so there is one URL for the site.
    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\.13flow\.eu$ [NC]
    RewriteRule ^/(.*)$ https://13flow.eu/$1 [R=301,L]

    # ---- security headers ----
    # HSTS belongs at the TLS edge. (Submit to the preload list only once you're sure.)
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    # Content-Security-Policy is intentionally NOT set here: the app emits a strict per-request
    # *nonce* CSP on HTML (script-src 'self' 'nonce-…', no 'unsafe-inline') and default-src 'none'
    # on JSON. A second static CSP would clash with the nonce. The app also sets
    # X-Frame-Options: DENY / X-Content-Type-Options / Referrer-Policy.

    # ---- method allow-list: open build is read-only ----
    <Location "/">
        <LimitExcept GET HEAD OPTIONS>
            Require all denied
        </LimitExcept>
    </Location>

    # ---- reverse proxy to gunicorn ----
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8000/ retry=0 timeout=30
    ProxyPassReverse / http://127.0.0.1:8000/
    RequestHeader set X-Forwarded-Proto "https"

    # Optional flood protection: a2enmod evasive (see the guide, step 9).

    ErrorLog  ${APACHE_LOG_DIR}/13flow_error.log
    CustomLog ${APACHE_LOG_DIR}/13flow_access.log combined
</VirtualHost>
