# /etc/apache2/sites-available/13flow.conf  —  13FLOW open build for 13flow.eu
# Apache fronts gunicorn (127.0.0.1:8000). Enable modules first:
#   a2enmod proxy proxy_http headers ssl rewrite
#
# The open build is read-only/GET-only; we deny everything else at the edge.
# Get certificates WITHOUT letting certbot rewrite this file:
#   certbot certonly --apache -d 13flow.eu -d www.13flow.eu

ServerTokens Prod
ServerSignature Off
TraceEnable Off

# ---------- HTTP :80  ->  force HTTPS (apex) ----------
<VirtualHost *:80>
    ServerName 13flow.eu
    ServerAlias www.13flow.eu
    RewriteEngine On
    RewriteRule ^/(.*)$ https://13flow.eu/$1 [R=301,L]
</VirtualHost>

# ---------- HTTPS :443 ----------
<VirtualHost *:443>
    ServerName 13flow.eu
    ServerAlias www.13flow.eu

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/13flow.eu/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/13flow.eu/privkey.pem
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder   off
    SSLSessionTickets     off

    # Canonicalize www -> apex so there is one URL for the site.
    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\.13flow\.eu$ [NC]
    RewriteRule ^/(.*)$ https://13flow.eu/$1 [R=301,L]

    # ---- security headers ----
    # HSTS belongs at the TLS edge. (Submit to the preload list only once you're sure.)
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    # Content-Security-Policy is intentionally NOT set here: the app emits a strict per-request
    # *nonce* CSP on HTML (script-src 'self' 'nonce-…', no 'unsafe-inline') and default-src 'none'
    # on JSON. A second static CSP would clash with the nonce. The app also sets
    # X-Frame-Options: DENY / X-Content-Type-Options / Referrer-Policy.

    # Optional private GoAccess report. The installer creates this fragment
    # only after its bcrypt-backed Basic Auth file exists.
    IncludeOptional /etc/apache2/13flow-stats.conf

    # ---- Privacy-safe aggregate agent statistics: GET/HEAD only ----
    <LocationMatch "^/api/agent-stats$">
        Require all granted
        <LimitExcept GET HEAD>
            Require all denied
        </LimitExcept>
        RequestHeader unset X-Forwarded-For
        RequestHeader unset Forwarded
    </LocationMatch>
    ProxyPass        /api/agent-stats http://127.0.0.1:8849/stats retry=0 timeout=5
    ProxyPassReverse /api/agent-stats http://127.0.0.1:8849/stats

    # ---- MCP: exact, POST-only, size-bounded, isolated local service ----
    <LocationMatch "^/api/mcp$">
        Require all granted
        <LimitExcept POST>
            Require all denied
        </LimitExcept>
        LimitRequestBody 1048576
        RequestHeader unset X-Forwarded-For
        RequestHeader unset Forwarded
    </LocationMatch>
    ProxyPass        /api/mcp http://127.0.0.1:8849/mcp retry=0 timeout=15
    ProxyPassReverse /api/mcp http://127.0.0.1:8849/mcp

    # ---- Pro API: isolated service with per-key auth, scopes and audit ----
    # Keep this before the catch-all proxy. The Pro application enforces
    # authentication and authorization; Apache only constrains HTTP methods.
    <Location "/api/pro/">
        Require all granted
        <LimitExcept GET HEAD OPTIONS POST PUT PATCH DELETE>
            Require all denied
        </LimitExcept>
    </Location>
    ProxyPass        /api/pro/ http://127.0.0.1:8001/api/pro/ retry=0 timeout=30
    ProxyPassReverse /api/pro/ http://127.0.0.1:8001/api/pro/

    # ---- method allow-list: open build is read-only ----
    # The admin login page is still served by the open app, but it needs POST
    # for the session form. All other public routes remain GET/HEAD/OPTIONS.
    <LocationMatch "^/(?!stats(?:/|$)|api/mcp$|api/pro/|pro/admin/login/?$|pro/admin/logout/?$)">
        <LimitExcept GET HEAD OPTIONS>
            Require all denied
        </LimitExcept>
    </LocationMatch>

    <Location "/pro/admin/login">
        Require all granted
        <LimitExcept GET HEAD OPTIONS POST>
            Require all denied
        </LimitExcept>
    </Location>

    <Location "/pro/admin/logout">
        Require all granted
        <LimitExcept POST>
            Require all denied
        </LimitExcept>
    </Location>

    # ---- reverse proxy to gunicorn ----
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8000/ retry=0 timeout=30
    ProxyPassReverse / http://127.0.0.1:8000/
    RequestHeader set X-Forwarded-Proto "https"

    # Optional flood protection: a2enmod evasive (see the guide, step 9).

    ErrorLog  ${APACHE_LOG_DIR}/13flow_error.log
    # Keep authentication attempts auditable without recording the submitted
    # username, query string, referrer or User-Agent. This log is not parsed by
    # the GoAccess report.
    LogFormat "%h %l - %t \"%m %U\" %>s %b" 13flow_stats_security
    CustomLog ${APACHE_LOG_DIR}/13flow_access.log combined env=!13flow_stats_request
    CustomLog ${APACHE_LOG_DIR}/13flow_stats_access.log 13flow_stats_security env=13flow_stats_request
</VirtualHost>
