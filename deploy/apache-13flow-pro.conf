# Add this block inside the TLS VirtualHost for 13flow.eu.
# It must appear before the catch-all ProxyPass / rule and before any broader /api rule.

# Pro API: routed to the dedicated 13flow-pro gunicorn service. Auth, scopes,
# per-key rate limits and audit are enforced by the app; Apache only rejects
# methods that are not part of the versioned Pro contract.
<Location "/api/pro/">
    Require all granted
    <LimitExcept GET HEAD OPTIONS POST PUT PATCH DELETE>
        Require all denied
    </LimitExcept>
</Location>

ProxyPass        /api/pro/ http://127.0.0.1:8001/api/pro/ retry=0 timeout=30
ProxyPassReverse /api/pro/ http://127.0.0.1:8001/api/pro/
