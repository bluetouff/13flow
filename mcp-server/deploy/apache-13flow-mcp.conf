# Add this block inside the TLS VirtualHost for 13flow.eu.
# It must appear before the catch-all ProxyPass / rule.

# MCP JSON-RPC endpoint: POST-only public transport.
<Location "/api/mcp">
    Require all granted
    <LimitExcept POST OPTIONS>
        Require all denied
    </LimitExcept>
</Location>

ProxyPass        /api/mcp http://127.0.0.1:8849/mcp retry=0 timeout=30
ProxyPassReverse /api/mcp http://127.0.0.1:8849/mcp

# Local health check only; do not expose this publicly unless you deliberately
# want MCP health in the public surface.
# ProxyPass        /api/mcp-health http://127.0.0.1:8849/healthz retry=0 timeout=10
# ProxyPassReverse /api/mcp-health http://127.0.0.1:8849/healthz
